spring:
  application:
    name: team3-backend-admin

  profiles:
    include: db, secret

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.ohgiraffers.team3backendadmin
  configuration:
    map-underscore-to-camel-case: true

# JWT
jwt:
  expiration: 1800000 # 30 minutes
  refresh-expiration: 604800000 # 7 days
# Google AI policy review
nlp:
  google:
    credentials-location: ${NLP_GOOGLE_CREDENTIALS_LOCATION:classpath:gcp-key.json}

google:
  ai:
    credentials-location: ${NLP_GOOGLE_CREDENTIALS_LOCATION:${nlp.google.credentials-location}}
    project-id: ${GOOGLE_AI_PROJECT_ID:}
    location: ${GOOGLE_AI_LOCATION:global}
    model: ${GOOGLE_AI_MODEL:gemini-3-flash-preview}

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  metrics:
    tags:
      application: ${spring.application.name}

feign:
  hr:
    url: ${FEIGN_HR_URL:http://localhost:8081}
